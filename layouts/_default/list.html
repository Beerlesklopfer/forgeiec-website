{{ define "main" }}

{{/* Section pages (language roots like /de/, /en/) use the same hero layout as home */}}
<section class="hero">
  <div class="hero-bg"></div>
  <div class="container hero-content">
    <h1 class="hero-title">{{ .Title }}</h1>
    <div class="hero-body">
      {{ .Content }}
    </div>
  </div>
</section>

{{ end }}
