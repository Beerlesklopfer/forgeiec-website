<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Document gradient -->
    <linearGradient id="doc-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <!-- Folded corner shadow -->
    <linearGradient id="doc-fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <!-- Anvil watermark gradient -->
    <linearGradient id="doc-anvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#3d3d3d"/>
    </linearGradient>
    <!-- Teal accent glow -->
    <radialGradient id="doc-teal" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#20B2AA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#008B8B" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="doc-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for page -->
    <filter id="doc-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ==================== ANVIL WATERMARK (behind page) ==================== -->
  <!-- Faint anvil silhouette visible through the page -->
  <g opacity="0.12" transform="translate(68, 90) scale(0.5)">
    <!-- Anvil base -->
    <path d="M80,210 L176,210 L170,235 Q168,242 160,242 L96,242 Q88,242 86,235 Z"
          fill="#3d3d3d"/>
    <!-- Anvil body -->
    <path d="M90,180 L166,180 L172,210 L84,210 Z"
          fill="#3d3d3d"/>
    <!-- Anvil face -->
    <path d="M42,155 L214,155 L214,180 Q214,184 210,184 L180,184
             L166,180 L90,180 L76,184 L46,184 Q42,184 42,180 Z"
          fill="#3d3d3d"/>
    <!-- Anvil top -->
    <rect x="42" y="148" width="172" height="10" rx="2" fill="#4a4a4a"/>
    <!-- Horn -->
    <path d="M42,155 L42,164 L16,170 Q10,171 10,167 L10,162 Q10,158 16,157 L42,152 Z"
          fill="#3d3d3d"/>
  </g>

  <!-- ==================== DOCUMENT PAGE ==================== -->
  <!-- Main page body with folded corner -->
  <g filter="url(#doc-shadow)">
    <path d="M48,22 L188,22 L208,42 L208,238 Q208,242 204,242 L52,242 Q48,242 48,238 Z"
          fill="url(#doc-page)" stroke="#999" stroke-width="1"/>
    <!-- Folded corner -->
    <path d="M188,22 L188,42 L208,42 Z"
          fill="url(#doc-fold)" stroke="#999" stroke-width="1"/>
  </g>

  <!-- Teal accent glow on page -->
  <rect x="48" y="22" width="160" height="220" rx="2" fill="url(#doc-teal)" opacity="0.5"/>

  <!-- ==================== MINI ANVIL ICON (top-left corner) ==================== -->
  <g transform="translate(56, 30) scale(0.14)">
    <!-- Simplified anvil -->
    <path d="M42,155 L214,155 L214,180 Q214,184 210,184 L180,184
             L166,180 L90,180 L76,184 L46,184 Q42,184 42,180 Z"
          fill="#2a2a2a" stroke="#222" stroke-width="2"/>
    <rect x="42" y="148" width="172" height="10" rx="2" fill="#555"/>
    <path d="M42,155 L42,164 L16,170 Q10,171 10,167 L10,162 Q10,158 16,157 L42,152 Z"
          fill="#3d3d3d"/>
    <path d="M80,210 L176,210 L170,235 Q168,242 160,242 L96,242 Q88,242 86,235 Z"
          fill="#2a2a2a"/>
    <path d="M90,180 L166,180 L172,210 L84,210 Z" fill="#3d3d3d"/>
  </g>

  <!-- ==================== TEXT LINES (document content) ==================== -->
  <!-- Title area with teal accent -->
  <rect x="80" y="34" width="80" height="3" rx="1" fill="#20B2AA" opacity="0.7"/>
  <rect x="80" y="40" width="60" height="2" rx="1" fill="#20B2AA" opacity="0.4"/>

  <!-- Separator line -->
  <line x1="60" y1="50" x2="196" y2="50" stroke="#bbb" stroke-width="0.5"/>

  <!-- Body text lines -->
  <rect x="64" y="60" width="128" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="70" width="120" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="80" width="132" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="90" width="90" height="3" rx="1" fill="#888" opacity="0.45"/>

  <!-- Blank space then more text -->
  <rect x="64" y="108" width="130" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="118" width="118" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="128" width="126" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="138" width="100" height="3" rx="1" fill="#888" opacity="0.45"/>

  <!-- Code block area (slightly indented, monospace look) -->
  <rect x="72" y="154" width="120" height="30" rx="3" fill="#2a2a2a" opacity="0.15"/>
  <rect x="78" y="160" width="80" height="2" rx="1" fill="#20B2AA" opacity="0.4"/>
  <rect x="78" y="168" width="60" height="2" rx="1" fill="#20B2AA" opacity="0.35"/>
  <rect x="78" y="176" width="70" height="2" rx="1" fill="#20B2AA" opacity="0.3"/>

  <!-- More body text -->
  <rect x="64" y="194" width="125" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="204" width="110" height="3" rx="1" fill="#888" opacity="0.5"/>
  <rect x="64" y="214" width="90" height="3" rx="1" fill="#888" opacity="0.45"/>

  <!-- ==================== TEAL ACCENT BAR ==================== -->
  <rect x="48" y="22" width="4" height="220" fill="#20B2AA" opacity="0.6"/>

  <!-- ==================== CODE FRAGMENTS (sparks) ==================== -->
  <g font-family="'Consolas','Monaco','Courier New',monospace" font-weight="bold" filter="url(#doc-glow)">
    <text x="212" y="60" font-size="13" fill="#20B2AA" opacity="0.9"
          transform="rotate(12, 212, 60)">IEC</text>
    <text x="218" y="100" font-size="11" fill="#40E0D0" opacity="0.8"
          transform="rotate(8, 218, 100)">docs</text>
    <text x="16" y="140" font-size="14" fill="#20B2AA" opacity="0.85"
          transform="rotate(-10, 16, 140)">&#167;</text>
    <text x="22" y="100" font-size="10" fill="#40E0D0" opacity="0.7"
          transform="rotate(-15, 22, 100)">API</text>
  </g>

  <!-- Teal spark dots around document -->
  <g filter="url(#doc-glow)">
    <circle cx="220" cy="46" r="2" fill="#20B2AA" opacity="0.7"/>
    <circle cx="230" cy="80" r="1.5" fill="#40E0D0" opacity="0.6"/>
    <circle cx="26" cy="118" r="1.8" fill="#20B2AA" opacity="0.65"/>
    <circle cx="224" cy="140" r="1.5" fill="#40E0D0" opacity="0.55"/>
  </g>

</svg>
